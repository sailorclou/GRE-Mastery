<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRE Mastery</title>
    <style>
        :root {
            /* DataCamp-inspired Palette */
            --primary: #631f6c; /* Dark Navy */
            --primary-light: #bf7bc8; /* Bright Blue */
            --accent: #03EF62; /* Bright Green */
            --bg-body: #FFFFFF;
            --bg-gray: #F7F7F7; /* Light Gray Background */
            --text-main: #05192D;
            --text-muted: #5D6F7D;
            --border: #E5E7EB;
            
            --success-bg: #eef6d0;
            --success-text: #7b931b;
            --error-bg: #FEE2E2;
            --error-text: #991B1B;

            --header-height: 60px;
            --sidebar-width: 250px; /* Right sidebar */
            --quiz-width: 600px; /* Center Quiz width */
        }

        * { box-sizing: border-box; }

        body {
            font-family: "Lucida Console", "Courier New", monospace;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        .header {
            font-family: 'Times New Roman', Times, serif;
            height: var(--header-height);
            background: var(--bg-body);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
            z-index: 20;
        }
        
        .logo { font-weight: 700; font-size: 1.1rem; color: var(--primary); display: flex; align-items: center; gap: 8px; padding-right: 1400px;}
        .logo-icon { width: 24px; height: 24px; background: var(--accent); border-radius: 4px; }

        /* --- LAYOUT CONTAINER --- */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- 1. LEFT: EXPLANATION (Main Content) --- */
        /* This is now the "Main" part, taking available space */
        .main-content {
            flex: 1;
            background: white;
            overflow-y: auto;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .explain-placeholder {
            color: var(--text-muted);
            margin-top: 100px;
            text-align: center;
            font-size: 1.1rem;
        }

        .explain-content { display: none; animation: fadeIn 0.3s; }
        
        .explain-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .explain-text {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #374151;
            margin-bottom: 40px;
        }

        .vocab-block {
            background: var(--bg-gray);
            padding: 24px;
            border-radius: 4px;
        }
        
        .vocab-header {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .vocab-list { list-style: none; padding: 0; margin: 0; }
        .vocab-item { margin-bottom: 12px; font-size: 0.95rem; line-height: 1.5; }
        .vocab-word { font-weight: 700; color: var(--primary); }


        /* --- 2. CENTER/RIGHT: QUIZ CARD (Fixed Width Panel) --- */
        .quiz-panel {
            width: var(--quiz-width);
            background: var(--bg-gray);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px;
            flex-shrink: 0;
        }

        .quiz-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 4px; /* Minimal radius */
            padding: 24px;
            /* No shadow for flat look */
        }

        .q-meta {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        .q-text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 24px;
            font-weight: 500;
        }

        /* Options */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        /* Grid Layouts for Multi-Blank */
        .layout-cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .layout-cols-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        .blank-header {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 6px;
            grid-column: span 1;
        }
        
        .option-group { display: flex; flex-direction: column; gap: 8px; }

        .option {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            background: white;
            transition: border-color 0.15s;
        }

        .option:hover { border-color: var(--primary-light); }

        .option-key {
            font-weight: 700;
            margin-right: 10px;
            color: var(--text-muted);
            min-width: 20px;
        }

        /* States */
        .option.selected { border-color: var(--primary-light); background-color: #EFF6FF; }
        .option.selected .option-key { color: var(--primary-light); }

        .option.correct { background-color: var(--success-bg); border-color: var(--success-text); color: var(--success-text); }
        .option.correct .option-key { color: var(--success-text); }

        .option.wrong { background-color: var(--error-bg); border-color: var(--error-text); color: var(--error-text); }
        .option.wrong .option-key { color: var(--error-text); }

        /* Controls */
        .controls { display: flex; gap: 10px; margin-top: auto; }
        .btn {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            text-align: center;
        }
        .btn:hover { background: var(--bg-gray); }
        .btn:disabled { color: #9CA3AF; cursor: not-allowed; }
        
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: #b367b5; }
        .btn-primary:disabled { background: #cebad0; color: white; }


        /* --- 3. RIGHT: SECTIONS (Navigation) --- */
        .sidebar-nav {
            width: var(--sidebar-width);
            background: var(--bg-body); /* Seamless background */
            /* No border left if we want it to feel like part of bg, but usually a border helps separation */
            /* border-left: 1px solid var(--border); */
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px;
        }

        .nav-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 16px;
            letter-spacing: 0.05em;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-btn {
            text-align: left;
            padding: 8px 12px;
            border: none;
            background: transparent; /* No frame */
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: color 0.1s, background 0.1s;
        }

        .nav-btn:hover {
            color: var(--primary);
            background: #E5E7EB; /* Subtle highlight */
        }

        .nav-btn.active {
            color: var(--primary);
            font-weight: 600;
            background: transparent; /* Keep it clean */
            /* Optional: Add a left marker */
            border-left: 2px solid var(--primary);
            border-radius: 0;
            padding-left: 10px;
        }

        /* Responsive adjustments */
        /* Slightly reduce panel sizes on narrower viewports */
        @media (max-width: 1100px) {
            :root {
                --quiz-width: 520px;
                --sidebar-width: 200px;
            }
        }

        /* Stack layout vertically for small and mobile devices */
        @media (max-width: 900px) {
            body { height: auto; }

            .header { padding: 0 12px; }
            .logo { padding-right: 0; font-size: 1rem; }

            .layout { flex-direction: column; }

            .main-content {
                border-right: none;
                padding: 20px;
                order: 1;
                max-height: none;
            }

            .quiz-panel {
                width: 100%;
                order: 2;
                border-right: none;
                border-top: 1px solid var(--border);
                padding: 16px;
            }

            .quiz-card { padding: 16px; }

            .sidebar-nav {
                width: 100%;
                order: 3;
                padding: 16px;
                border-left: none;
                border-top: 1px solid var(--border);
            }

            .options-container { gap: 6px; }
            .q-text { font-size: 1.05rem; }
            .explain-text { font-size: 1rem; }
            .vocab-block { padding: 16px; }
            .controls { flex-direction: row; gap: 8px; }

            /* For multi-column option groups, make them flow vertically on small screens */
            .layout-cols-2, .layout-cols-3 { display: block; }
            .blank-header { margin-top: 12px; }
        }

        /* Very small screens */
        @media (max-width: 480px) {
            :root { --header-height: 52px; }
            body { font-size: 14px; }
            .header { height: var(--header-height); }
            .logo { font-size: 0.95rem; }
            .q-text { font-size: 1rem; }
            .option { padding: 8px 10px; font-size: 0.95rem; }
            .btn { padding: 8px; font-size: 0.8rem; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

<header class="header">
    <div class="logo">
        <!-- <div class="logo-icon"></div> -->
        GRE Mastery
    </div>
    <button id="reset-btn" class="btn" style="width: auto;" onclick="resetCurrentQuestion()">Reset</button>
</header>

<div class="layout">
    <!-- 1. Left: Explanation (Main Focus) -->
    <main class="main-content">
        <div id="explain-placeholder" class="explain-placeholder">
            <h3>Explanation Area</h3>
            <p>Select an answer or click "Show Explanation" to view detailed analysis here.</p>
        </div>

        <div id="explain-content" class="explain-content">
            <div class="explain-title">Question Analysis</div>
            <div id="explain-text" class="explain-text"></div>
            
            <div id="vocab-block" class="vocab-block" style="display:none;">
                <div class="vocab-header">Key Vocabulary</div>
                <ul id="vocab-list" class="vocab-list"></ul>
            </div>
        </div>
    </main>

    <!-- 2. Center: Quiz Card -->
    <aside class="quiz-panel">
        <div class="quiz-card">
            <div class="q-meta">
                <span id="section-badge">Section</span>
                <span><span id="q-current">0</span> / <span id="q-total">0</span></span>
            </div>

            <div id="question-text" class="q-text">
                Select a section to start.
            </div>

            <div id="options-container" class="options-container"></div>

            <div class="controls">
                <button id="prev-btn" class="btn" onclick="navQuestion(-1)" disabled>Prev</button>
                <button id="next-btn" class="btn btn-primary" onclick="navQuestion(1)" disabled>Next</button>
            </div>
            <div style="margin-top: 10px;">
                 <button id="reveal-btn" class="btn" style="width:100%" onclick="revealAnswer()" disabled>Show Explanation</button>
            </div>
        </div>
    </aside>

    <!-- 3. Right: Section Navigation -->
    <aside class="sidebar-nav">
        <div class="nav-title">Sections</div>
        <div id="section-list" class="nav-list"></div>
    </aside>
</div>

<script>
    let allData = [];
    let activeQuestions = [];
    let curIndex = 0;
    let currentSelection = {}; 
    let isGraded = false;

    // --- INIT ---
    fetch('gre_data_enriched.json')
        .then(r => r.ok ? r.json() : fetch('gre_data.json').then(r => r.json()))
        .then(data => {
            allData = data.filter(q => q.question && q.options.length > 0);
            initSidebar();
        })
        .catch(e => document.getElementById('question-text').innerText = "Error loading data.");

    // --- LOGIC ---
    function getQuestionMeta(q) {
        const len = q.options.length;
        let type = 'SINGLE';
        let groups = 1;
        
        if (len === 9) {
            type = 'TRIPLE'; groups = 3;
        } else if (len === 6) {
            if (q.question.includes('(ii)') || q.question.includes('Blank')) {
                type = 'DOUBLE'; groups = 2;
            } else {
                type = 'SE'; groups = 1;
            }
        }
        return { type, groups };
    }

    function initSidebar() {
        const sections = [...new Set(allData.map(q => q.section))];
        sections.sort((a, b) => {
            const nA = parseInt(a.match(/\d+/)) || 0;
            const nB = parseInt(b.match(/\d+/)) || 0;
            return nA - nB;
        });

        const container = document.getElementById('section-list');
        sections.forEach((sec, idx) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = sec.replace(/\b\w/g, l => l.toUpperCase());
            btn.onclick = () => loadSection(sec, btn);
            container.appendChild(btn);
            if(idx === 0) loadSection(sec, btn);
        });
    }

    function loadSection(name, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        activeQuestions = allData.filter(q => q.section === name);
        activeQuestions.sort((a,b) => a.question_number - b.question_number);
        
        curIndex = 0;
        renderQuestion();
    }

    function renderQuestion() {
        if (!activeQuestions.length) return;
        
        currentSelection = {};
        isGraded = false;
        const q = activeQuestions[curIndex];
        const meta = getQuestionMeta(q);

        // Reset UI
        document.getElementById('explain-content').style.display = 'none';
        document.getElementById('explain-placeholder').style.display = 'block';
        
        document.getElementById('section-badge').innerText = q.section;
        document.getElementById('q-current').innerText = curIndex + 1;
        document.getElementById('q-total').innerText = activeQuestions.length;
        document.getElementById('question-text').innerHTML = `<strong>${q.question_number}.</strong> ${q.question}`;
        
        document.getElementById('prev-btn').disabled = curIndex === 0;
        document.getElementById('next-btn').disabled = true;
        document.getElementById('reveal-btn').disabled = !q.correctAnswer;

        // Render Options
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        container.className = 'options-container'; 

        if (meta.type === 'TRIPLE') container.classList.add('layout-cols-3');
        else if (meta.type === 'DOUBLE') container.classList.add('layout-cols-2');

        for (let g = 0; g < meta.groups; g++) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'option-group';

            if (meta.groups > 1) {
                const header = document.createElement('div');
                header.className = 'blank-header';
                header.innerText = `Blank (${['i','ii','iii'][g]})`;
                groupDiv.appendChild(header);
            }

            const startIdx = meta.groups > 1 ? g * 3 : 0;
            const endIdx = meta.groups > 1 ? startIdx + 3 : q.options.length;

            for (let i = startIdx; i < endIdx; i++) {
                if (!q.options[i]) continue;
                const opt = q.options[i];
                const el = document.createElement('div');
                el.className = 'option';
                el.dataset.key = opt.key;
                el.dataset.group = g;
                el.innerHTML = `<span class="option-key">${opt.key}</span> ${opt.text}`;
                el.onclick = () => handleSelect(el, opt.key, g, meta, q.correctAnswer);
                groupDiv.appendChild(el);
            }
            container.appendChild(groupDiv);
        }
    }

    function handleSelect(el, key, group, meta, correctKey) {
        if (isGraded || !correctKey) return;

        if (meta.type === 'SE') {
            // Toggle Logic
            if (!currentSelection[0]) currentSelection[0] = [];
            const arr = currentSelection[0];
            
            if (arr.includes(key)) {
                currentSelection[0] = arr.filter(k => k !== key);
                el.classList.remove('selected');
            } else {
                if (arr.length < 2) {
                    arr.push(key);
                    el.classList.add('selected');
                }
            }
        } else {
            // Radio Logic
            const siblings = el.parentElement.querySelectorAll('.option');
            siblings.forEach(s => s.classList.remove('selected'));
            currentSelection[group] = key;
            el.classList.add('selected');
        }

        checkAutoSubmit(meta, correctKey);
    }

    function checkAutoSubmit(meta, correctKey) {
        let ready = false;
        if (meta.type === 'SE') {
            if (currentSelection[0] && currentSelection[0].length === 2) ready = true;
        } else {
            if (Object.keys(currentSelection).length === meta.groups) ready = true;
        }

        if (ready) gradeQuestion(correctKey);
    }

    function gradeQuestion(correctKey) {
        isGraded = true;
        document.querySelectorAll('.option').forEach(opt => {
            const key = opt.dataset.key;
            const isSelected = opt.classList.contains('selected');
            const isCorrect = correctKey.includes(key);

            if (isCorrect) {
                opt.classList.add('correct');
                opt.classList.remove('selected');
            } else if (isSelected) {
                opt.classList.add('wrong');
                opt.classList.remove('selected');
            }
        });
        
        document.getElementById('next-btn').disabled = false;
        revealAnswer();
    }

    function revealAnswer() {
        const q = activeQuestions[curIndex];
        if (!q.correctAnswer) return;

        // Force visuals if clicked manually
        if (!isGraded) gradeQuestion(q.correctAnswer);

        document.getElementById('explain-placeholder').style.display = 'none';
        document.getElementById('explain-content').style.display = 'block';
        document.getElementById('explain-text').innerText = q.explanation || "No explanation available.";

        const vocabDiv = document.getElementById('vocab-block');
        const vocabList = document.getElementById('vocab-list');
        vocabList.innerHTML = '';

        if (q.vocabulary && q.vocabulary.length > 0) {
            vocabDiv.style.display = 'block';
            q.vocabulary.forEach(v => {
                const li = document.createElement('li');
                li.className = 'vocab-item';
                li.innerHTML = `<span class="vocab-word">${v.word}</span>: ${v.definition}`;
                vocabList.appendChild(li);
            });
        } else {
            vocabDiv.style.display = 'none';
        }
    }

    function navQuestion(delta) {
        const newIdx = curIndex + delta;
        if (newIdx >= 0 && newIdx < activeQuestions.length) {
            curIndex = newIdx;
            renderQuestion();
        }
    }

    function resetCurrentQuestion() {
        renderQuestion();
    }
</script>

</body>
</html>
